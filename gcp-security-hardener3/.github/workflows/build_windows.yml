name: Build GCP Security Hardener Windows App v2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- 1. SETUP ENV ---
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    # --- 2. BUILD BACKEND ---
    - name: Install Python Dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Backend Executable
      working-directory: ./backend
      run: |
        pyinstaller --clean build_backend.spec
        # Check if exe exists
        if (Test-Path dist/gcp-scanner-backend/gcp-scanner-backend.exe) {
           Write-Host "Backend EXE created successfully"
        } else {
           Write-Error "Backend EXE creation failed"
           Get-ChildItem dist -Recurse
           exit 1
        }

    # --- 3. BUILD FRONTEND & ELECTRON ---
    # --- 3. PACKAGE APPLICATION ---
    - name: Install Root Dependencies
      run: npm install --force

    - name: Build Electron App (Windows)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Skip frontend build since we committed 'frontend/out'
        npx electron-builder --win

    # --- 4. UPLOAD ARTIFACTS ---
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: GCP-Security-Hardener-Windows-Setup
        path: dist/*.exe
        if-no-files-found: error
